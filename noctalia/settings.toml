config_version = 2

[bar.default]
background_opacity = 0.63999998569488525
center = ["workspaces", "clock"]
contact_shadow = true
margin_ends = 0
radius_bottom_left = 0
radius_bottom_right = 0
radius_top_left = 0
radius_top_right = 0
start = ["launcher", "wallpaper", "cpu", "ram"]

[calendar]
enabled = true

[idle]
behavior_order = ["lock", "screen-off", "lock-and-suspend"]

[idle.behavior.lock]
action = "lock"
enabled = true
timeout = 600.0

[idle.behavior.lock-and-suspend]
action = "lock_and_suspend"
enabled = true
timeout = 900.0

[idle.behavior.screen-off]
action = "screen_off"
enabled = true
timeout = 660.0

[location]
address = "москва"
auto_locate = true

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = ["lockscreen-login-box@eDP-1"]

[lockscreen_widgets.grid]
cell_size = 16
major_interval = 4
visible = true

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
box_height = 70.0
box_width = 400.0
cx = 800.0
cy = 781.0
output = "eDP-1"
rotation = 0.0
type = "login_box"

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
background_color = "surface_variant"
background_opacity = 0.88
background_radius = 12.0
center_password_text = false
input_opacity = 1.0
input_radius = 6.0
show_caps_lock = true
show_keyboard_layout = true
show_login_button = true
show_password_hint = true

[shell.panel]
session_placement = "floating"
session_position = "center"

[theme.templates]
builtin_ids = ["btop", "gtk3", "kitty", "niri", "qt"]
community_ids = ["yazi", "zathura"]

[wallpaper]
directory = "/usr/share/noctalia/assets/"

[wallpaper.default]
path = "/usr/share/noctalia/assets/noctalia-wallpaper.png"

[wallpaper.last]
path = "/usr/share/noctalia/assets/noctalia-wallpaper.png"

[widget.clock]
format = "{:%Y-%m-%d %H:%M}"

[widget.workspaces]
display = "name"

