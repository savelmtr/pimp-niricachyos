config_version = 2

[bar.default]
background_opacity = 0.63999998569488525
center = ["workspaces", "clock", "media"]
contact_shadow = true
end = [
  "keyboard_layout",
  "lock_keys",
  "tray",
  "notifications",
  "clipboard",
  "network",
  "bluetooth",
  "volume",
  "brightness",
  "battery",
  "session",
]
margin_ends = 0
radius_bottom_left = 0
radius_bottom_right = 0
radius_top_left = 0
radius_top_right = 0
start = ["temp", "cpu", "ram"]

[calendar]
enabled = true


[idle]
behavior_order = ["lock", "screen-off", "lock-and-suspend"]

[idle.behavior.lock]
action = "lock"
enabled = false
timeout = 180.0

[idle.behavior.lock-and-suspend]
action = "lock_and_suspend"
enabled = true
timeout = 300.0

[idle.behavior.screen-off]
action = "screen_off"
enabled = true
timeout = 180.0

[location]
address = "москва"
auto_locate = true

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
  "lockscreen-login-box@eDP-1",
  "lockscreen-widget-0000000000000001",
  "lockscreen-widget-0000000000000002",
]

[lockscreen_widgets.grid]
cell_size = 16
major_interval = 4
visible = true

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
box_height = 70.0
box_width = 400.0
cx = 800.0
cy = 546.0
output = "eDP-1"
rotation = 0.0
type = "login_box"

[lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
background_color = "surface_variant"
background_opacity = 0.88
background_radius = 12.0
center_password_text = false
input_opacity = 1.0
input_radius = 6.0
show_caps_lock = true
show_keyboard_layout = true
show_login_button = true
show_password_hint = true

[lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
box_height = 0.0
box_width = 0.0
cx = 800.0
cy = 388.0
output = "eDP-1"
rotation = 0.0
type = "weather"

[lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
box_height = 0.0
box_width = 0.0
cx = 800.0
cy = 253.5
output = "eDP-1"
rotation = 0.0
type = "clock"

[shell.panel]
open_near_click_control_center = true
session_placement = "floating"
session_position = "center"

[theme.templates]
builtin_ids = ["btop", "gtk3", "kitty", "niri", "qt"]
community_ids = ["yazi", "zathura"]

[wallpaper]
directory = "/usr/share/noctalia/assets/"

[wallpaper.default]
path = "/usr/share/noctalia/assets/noctalia-wallpaper.png"

[wallpaper.last]
path = "/usr/share/noctalia/assets/noctalia-wallpaper.png"

[widget.clock]
format = "{:%Y-%m-%d %H:%M}"

[widget.network]
show_label = false

[widget.workspaces]
display = "name"

